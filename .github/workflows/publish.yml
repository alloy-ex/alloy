name: Publish to Hex.pm

on:
  push:
    tags:
      - "v*"

env:
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "27"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test
      - run: mix format --check-formatted
      - run: mix credo --strict

  publish:
    name: Publish to Hex.pm
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - run: mix deps.get
      - run: mix compile

      - name: Publish to Hex.pm
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Trigger landing-site version sync
        if: ${{ secrets.ALLOY_WEBSITE_SYNC_TOKEN != '' }}
        env:
          ALLOY_WEBSITE_SYNC_TOKEN: ${{ secrets.ALLOY_WEBSITE_SYNC_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${ALLOY_WEBSITE_SYNC_TOKEN}" \
            https://api.github.com/repos/alloy-ex/alloy-ex.github.io/dispatches \
            -d "{\"event_type\":\"hex_release_published\",\"client_payload\":{\"tag\":\"${GITHUB_REF_NAME}\"}}"

      - name: Skip landing-site sync dispatch (missing token)
        if: ${{ secrets.ALLOY_WEBSITE_SYNC_TOKEN == '' }}
        run: |
          echo "::warning::ALLOY_WEBSITE_SYNC_TOKEN is not configured; landing-site sync was not triggered."
